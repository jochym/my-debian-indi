name: Build & Deploy APT Repository

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to use (default: latest)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REPO_CODENAME: stable
  REPO_COMPONENT: main
  REPO_ORIGIN: Debian INDI
  REPO_LABEL: Debian INDI Repository
  REPO_SUITE: stable
  REPO_ARCHITECTURES: "arm64 amd64"
  REPO_DESCRIPTION: "Debian INDI repository for Debian stable"

jobs:
  repo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY != '' }}
    container:
      image: debian:trixie-slim
    steps:
      - name: Install tools
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            dpkg-dev apt-utils git gnupg curl jq ca-certificates

      - name: Configure apt for quiet mode
        run: |
          cat > /etc/apt/apt.conf.d/99opencode-quiet <<'EOF'
          APT::Get::Quiet "2";
          Dpkg::Progress-Fancy "0";
          quiet "true";
          EOF

      - name: Determine release tag
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            echo "No tag specified, finding latest release..."
            TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
              jq -r '.tag_name // empty')
            if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
              echo "::error::No releases found!"
              exit 1
            fi
          fi
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "Using versioned release: $TAG"

      - name: Download .deb from versioned Release
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          API="https://api.github.com/repos/${{ github.repository }}"
          DOWNLOAD_BASE="https://github.com/${{ github.repository }}/releases/download/$TAG"

          mkdir -p repo-site/pool/main

          echo "Fetching assets for $TAG..."
          curl -s -H "Authorization: token $TOKEN" \
            "$API/releases/tags/$TAG" | jq -r '.assets[]? | .name' > /tmp/all_assets.txt

          COUNT=$(wc -l < /tmp/all_assets.txt)
          echo "Found $COUNT packages (dbg/dbgsym already filtered at build-release stage)"
          export DOWNLOAD_BASE
          xargs -P 4 -I {} -a /tmp/all_assets.txt \
            sh -c 'curl -s -L -o "repo-site/pool/main/{}" "$DOWNLOAD_BASE/{}"'

          echo "Downloaded $COUNT packages"
          echo "Total pool size: $(du -sh repo-site/pool/main | cut -f1)"

      - name: Generate apt-ftparchive config
        run: |
          cat > apt-release.conf <<EOF
          APT::FTPArchive::Release::Origin "${REPO_ORIGIN}";
          APT::FTPArchive::Release::Label "${REPO_LABEL}";
          APT::FTPArchive::Release::Suite "${REPO_SUITE}";
          APT::FTPArchive::Release::Codename "${REPO_CODENAME}";
          APT::FTPArchive::Release::Architectures "${REPO_ARCHITECTURES}";
          APT::FTPArchive::Release::Components "${REPO_COMPONENT}";
          APT::FTPArchive::Release::Description "${REPO_DESCRIPTION}";
          EOF

      - name: Generate repository indices
        run: |
          mkdir -p repo-site/dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64
          mkdir -p repo-site/dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64

          cd repo-site

          # Generate Packages for arm64
          apt-ftparchive packages pool/main > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64/Packages
          gzip -fk dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64/Packages
          echo "${REPO_COMPONENT}" > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-arm64/Components

          # Generate Packages for amd64
          apt-ftparchive packages pool/main > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64/Packages
          gzip -fk dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64/Packages
          echo "${REPO_COMPONENT}" > dists/${REPO_CODENAME}/${REPO_COMPONENT}/binary-amd64/Components

      - name: Generate Release file
        run: |
          cd repo-site
          apt-ftparchive release -c ../apt-release.conf dists/${REPO_CODENAME} > dists/${REPO_CODENAME}/Release

      - name: Import GPG key and sign
        if: env.HAS_GPG_KEY == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "${GPG_PRIVATE_KEY}" | gpg --import --batch --yes

          # Extract full 40-char fingerprint from fpr: record
          KEY_FPR=$(gpg --list-keys --with-colons | grep '^fpr:' | head -1 | cut -d: -f10)
          echo "Using key fingerprint: ${KEY_FPR}"

          # Export public key for users
          gpg --export --armor "${KEY_FPR}" > repo-site/gpg_public_key.asc

          cd repo-site/dists/${REPO_CODENAME}
          # InRelease (clear-signed) - preferred by modern APT
          gpg --trust-model always --clearsign --digest-algo SHA256 \
            --local-user "${KEY_FPR}" \
            --output InRelease Release
          # Release.gpg (detached signature) - for older APT
          gpg --trust-model always --armor --detach-sign \
            --local-user "${KEY_FPR}" \
            --output Release.gpg Release

      - name: Create index.html
        run: |
          cat > repo-site/index.html << 'ENDOFFILE'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>INDI APT Repository (unofficial)</title>
          <style>
            body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
            code { background: #f4f4f4; padding: 0.2em 0.4em; border-radius: 4px; }
            pre { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 4px; overflow-x: auto; }
            .btn { display: inline-block; background: #0366d6; color: white; padding: 0.5rem 1rem; border-radius: 4px; text-decoration: none; }
            .btn:hover { background: #0256b3; }
          </style>
          </head>
          <body>
          <h1>INDI APT Repository (unofficial)</h1>

          <p>Community-maintained repository for <strong>INDI Library</strong> and 3rd-party drivers, built for Debian-based distributions (Trixie/Stable). Automatically built from upstream tags at <code>indilib/indi</code> and <code>indilib/indi-3rdparty</code>.</p>
          <p><strong>Note:</strong> This is an independent, unofficial repository with no affiliation to the astroberry project or the upstream INDI organization.</p>

          <h2>GPG Key</h2>
          <p>Public key for verifying repository signatures:</p>
          <p><a href="/gpg_public_key.asc" class="btn">Download public key (ASCII armor)</a></p>
          <pre>curl -fsSL https://jochym.github.io/debian-indi/gpg_public_key.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/debian-indi.gpg</pre>

          <h2>Adding the Repository</h2>
          <p>Add to <code>/etc/apt/sources.list.d/debian-indi.list</code>:</p>
          <pre>deb [signed-by=/etc/apt/trusted.gpg.d/debian-indi.gpg] https://jochym.github.io/debian-indi/ stable main</pre>
          <p>Or without GPG verification (faster for testing):</p>
          <pre>deb [trusted=yes] https://jochym.github.io/debian-indi/ stable main</pre>
          <p>Then:</p>
          <pre>sudo apt update
          sudo apt install indi-3rdparty-drivers</pre>

          <h2>Available Packages</h2>
          <ul>
          <li><strong>indi-bin</strong>, <strong>libindi1</strong>, <strong>libindi-dev</strong>, <strong>libindi-data</strong> – core INDI Library</li>
          <li><strong>indi-3rdparty-libs</strong> – meta-package for 3rd-party libraries (empty)</li>
          <li><strong>indi-3rdparty-drivers</strong> – meta-package for all 3rd-party drivers (Recommends all <code>indi-*</code>)</li>
          <li>Several dozen drivers: <code>indi-eqmod</code>, <code>indi-gphoto</code>, <code>indi-asi</code>, <code>indi-qhy</code>, <code>indi-sbig</code>, <code>indi-playerone</code> and more</li>
          </ul>
          <p>Individual packages can be downloaded from the <a href="https://github.com/jochym/debian-indi/releases/latest">GitHub Releases page</a>.</p>

          <h2>Architectures</h2>
          <p><strong>amd64</strong> (x86_64) and <strong>arm64</strong> (aarch64 – Raspberry Pi, Orange Pi, etc.)</p>

          <h2>Updates</h2>
          <p>Repository is refreshed manually when upstream tags are released. Versions are always synchronized with <code>indilib/indi</code> and <code>indilib/indi-3rdparty</code>.</p>

          <hr>
          <p><small>Automatically built by GitHub Actions. Sources: <a href="https://github.com/indilib/indi">indilib/indi</a>, <a href="https://github.com/indilib/indi-3rdparty">indilib/indi-3rdparty</a>.</small></p>
          </body>
          </html>
          ENDOFFILE

      - name: Deploy to gh-pages (history pruning)
        run: |
          cd repo-site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Automated update of INDI APT repository (history pruned)"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin gh-pages --force

  trigger-test:
    needs: [repo]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - run: |
          gh workflow run "Test APT Repository" --ref "${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
